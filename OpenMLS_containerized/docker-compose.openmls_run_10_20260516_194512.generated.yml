name: mls-openmls_run_10_20260516_194512

x-worker-common: &worker-common
  image: mls-worker
  environment:
    OPENMLS_PROFILE_RUN_ID: openmls_run_10_20260516_194512
    OPENMLS_PROFILE_SCENARIO: http-staircase-compose
    OPENMLS_PROFILE_SCENARIO_SEED: 958411140
    MLS_DEBUG_LOGS: ${MLS_DEBUG_LOGS:-}
    OPENMLS_WORKER_DEBUG_IDS: ${OPENMLS_WORKER_DEBUG_IDS:-}
