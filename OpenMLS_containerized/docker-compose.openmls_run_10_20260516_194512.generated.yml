      OPENMLS_DS_DELIVERY_MODE: ${OPENMLS_DS_DELIVERY_MODE:-group-log}
      OPENMLS_SERVICE_METRICS_WARN_IN_FLIGHT: ${OPENMLS_SERVICE_METRICS_WARN_IN_FLIGHT:-128}
    ports:
      - "3000:3000"
    networks:
      - bench-net-000
      - bench-net-001
      - bench-net-002
      - bench-net-003
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

  relay:
