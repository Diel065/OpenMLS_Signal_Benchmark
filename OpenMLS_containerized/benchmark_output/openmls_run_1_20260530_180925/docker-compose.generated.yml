      OPENMLS_WORKER_HTTP_CONNECT_TIMEOUT_MS: ${OPENMLS_WORKER_HTTP_CONNECT_TIMEOUT_MS:-5000}
      OPENMLS_WORKER_HTTP_REQUEST_TIMEOUT_MS: ${OPENMLS_WORKER_HTTP_REQUEST_TIMEOUT_MS:-30000}
      OPENMLS_WORKER_OUTBOUND_HTTP_PERMITS: ${OPENMLS_WORKER_OUTBOUND_HTTP_PERMITS:-32}
    networks:
      - bench-net-003

  runner:
    image: mls-runner
    profiles:
      - runner
    depends_on:
      - ds
      - relay
    environment:
      OPENMLS_RUNNER_HTTP_CONNECT_TIMEOUT_MS: ${OPENMLS_RUNNER_HTTP_CONNECT_TIMEOUT_MS:-2000}
      OPENMLS_RUNNER_HTTP_REQUEST_TIMEOUT_MS: ${OPENMLS_RUNNER_HTTP_REQUEST_TIMEOUT_MS:-60000}
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - ./benchmark_output:/results
    networks:
      - bench-net-000
      - bench-net-001
      - bench-net-002
      - bench-net-003
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bench-net-000:
    driver: bridge
  bench-net-001:
    driver: bridge
  bench-net-002:
    driver: bridge
  bench-net-003:
    driver: bridge
