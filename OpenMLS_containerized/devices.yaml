devices:
  - id: luckfox-pico-plus-01
    enabled: true
    kind: luckfox_pico_plus

    connection:
      type: adb
      serial: "242d5fe430c7c951"
      server_socket_candidates:
        - "local"
        - "tcp:100.71.112.120:15037"

    transport:
      type: usb_rndis
      device_ip: "172.32.0.93"
      host_ip: "172.32.0.98"
      worker_port: 8080
      worker_url_candidates:
        - "http://100.71.112.120:18081"

    target:
      arch: "armv7l"
      rust_target: "armv7-unknown-linux-musleabihf"
      binary: "target/armv7-unknown-linux-musleabihf/minsize/worker"

    worker:
      id: "pico-plus-00001"
      mode: "singleton"
      remote_binary: "/worker"
      remote_root: "/opt/openmls-benchmark"
      remote_results_root: "/results/openmls"
      remote_tmp: "/tmp/openmls-benchmark"

    metadata:
      execution_backend: "real_device"
      device_kind: "luckfox_pico_plus"
      transport: "usb_rndis"
      access_backend: "adb"

  - id: raspberry-pi-01
    enabled: true
    kind: raspberry_pi_5

    connection:
      type: ssh
      host: "192.168.178.33"
      user: "diel"
      password: "diel"
      host_candidates:
        - host: "100.71.112.120"
          port: 10022

    transport:
      type: wifi_lan
      device_ip: "192.168.178.33"
      host_ip: "192.168.178.21"
      worker_port: 8080
      worker_url_candidates:
        - "http://100.71.112.120:18080"

    target:
      arch: "aarch64"
      rust_target: "aarch64-unknown-linux-musl"
      binary: "target/aarch64-unknown-linux-musl/minsize/worker"

    worker:
      id: "raspi5-00001"
      mode: "singleton"
      remote_binary: "/home/diel/openmls-benchmark/bin/worker"
      remote_results_root: "/home/diel/openmls-benchmark/results/openmls"
      remote_tmp: "/home/diel/openmls-benchmark/tmp"

    metadata:
      execution_backend: "real_device"
      device_kind: "raspberry_pi_5"
      transport: "wifi_lan"
      access_backend: "ssh"
